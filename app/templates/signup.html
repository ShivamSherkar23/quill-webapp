{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:60px auto;">
    <h2 style="margin-bottom:16px; text-align:center;">Create Account</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/signup">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required maxlength="50" pattern="[a-zA-Z0-9_]+" title="Letters, numbers, underscores only">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required maxlength="120">
        </div>
        <div class="form-group">
            <label for="display_name">Display Name (optional)</label>
            <input type="text" id="display_name" name="display_name" maxlength="100">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn" style="width:100%;">Sign Up</button>
    </form>
    <p style="text-align:center; margin-top:14px;">
        Already have an account? <a href="/login" class="link">Log in</a>
    </p>
</div>
{% endblock %}
